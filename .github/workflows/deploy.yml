name: Deploy to GitHub Pages

# 정적 사이트(HTML/CSS/JS)를 GitHub Pages로 자동 배포합니다.
# 최초 1회: 저장소 Settings ▸ Pages ▸ Source 를 "GitHub Actions"로 설정하세요.

on:
  push:
    branches:
      - main
      - claude/korean-exam-website-5usqf9
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중인 배포는 취소하지 않고 순차 처리)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 사이트 루트 전체를 업로드 (빌드 과정 없음)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
